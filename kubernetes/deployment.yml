# this is practice deployment file

kind: Deployment
apiVersion: apps/v1
metadata:
  name: devsecopsdep
  namespace: devsecops
  labels:
    app: devsecops-app
spec: 
  replicas: 5
  selector:
    matchLabels: 
      app: devsecops-app
  template:
    metadata:
      labels:
        app: devsecops-app
    spec: 
      containers:
      - name: node-cont
        image: devsecops:v1
        imagePullPolicy: IfNotPresent # Always
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000

        ports:
        - containerPort: 3000
        envFrom:
          - configMapRef:
              name: app-config
          - secretRef:
              name: app-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
