# Deployment file for devsecops-app

kind: Deployment
apiVersion: app/v1
metadata:
  name: node-app
  namespace: k8s

spec:
  replicas: 2
  
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
        - name: devsecops-app

      image: 843643649910.dkr.ecr.us-east-2.amazonaws.com/devsecops-app:v1
      ports:
        - containerPorts: 3000
      env:
        - name: APP_version
          value: "v1"

  
