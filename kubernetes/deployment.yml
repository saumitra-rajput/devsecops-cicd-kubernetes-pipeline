# this is practice deployment file

kind: Deployment
apiVersion: apps/v1
metadata:
  name: deployment
  namespace: app
  labels:
    app: node-app
spec: 
  replicas: 2
  selector:
    matchLabels: 
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec: 
      containers:
      - name: node-cont
        image: httpd
        ports:
        - containerPort: 3000
        envFrom:
          - configMapRef:
              name: app-config
          - secretRef:
              name: app-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
